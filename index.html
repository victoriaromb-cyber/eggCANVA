<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>egg — we move you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Anton&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0A0A0A;
    --fg:#F5F1EA;
    --accent:#FF4D3D;   /* ← REPLACE with real EGG hex from intranet */
    --muted:#8A8680;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--fg); overflow-x:hidden; line-height:1.6; }
  .display { font-family:'Anton',sans-serif; letter-spacing:-0.02em; line-height:0.95; text-transform:uppercase; }
  .accent { color:var(--accent); }

  nav { position:fixed; top:0; left:0; right:0; padding:24px 48px; display:flex; justify-content:space-between; align-items:center; z-index:100; backdrop-filter:blur(20px); background:rgba(10,10,10,0.6); border-bottom:1px solid rgba(245,241,234,0.08); }
  nav .logo { font-family:'Inter',sans-serif; font-weight:700; font-size:22px; letter-spacing:-0.02em; }
  nav .logo::after { content:''; display:inline-block; width:8px; height:8px; background:var(--accent); border-radius:50%; margin-left:4px; }
  nav ul { display:flex; gap:32px; list-style:none; }
  nav ul a { color:var(--fg); text-decoration:none; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; opacity:0.7; transition:opacity 0.3s; }
  nav ul a:hover { opacity:1; }

  section { min-height:100vh; padding:120px 48px; position:relative; }

  /* HERO */
  #hero { display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; background: radial-gradient(ellipse at center, #1a1a1a 0%, var(--bg) 70%); }
  #hero::before { content:''; position:absolute; inset:0; background:url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=1920') center/cover; opacity:0.22; filter:grayscale(100%); }
  #hero .content { position:relative; z-index:2; }
  #hero .caption { font-size:11px; letter-spacing:0.4em; opacity:0.6; margin-bottom:48px; }
  #hero h1 { font-size:clamp(80px,14vw,220px); margin-bottom:24px; }
  #hero .sub { font-size:18px; opacity:0.7; max-width:600px; margin:0 auto; }
